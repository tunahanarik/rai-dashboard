version: "3.8"

services:
  rai-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rai-dashboard
    restart: unless-stopped

    # Security: bind to localhost only — never expose directly to internet
    ports:
      - "127.0.0.1:3001:3000"

    # Environment
    env_file:
      - .env

    # Security hardening
    read_only: true # Read-only root filesystem
    security_opt:
      - "no-new-privileges:true" # Prevent privilege escalation
    cap_drop:
      - ALL # Drop all Linux capabilities

    # Temporary filesystem for Node.js (if needed)
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # Network: host mode so app can reach local RPC on 127.0.0.1:43657
    # If using bridge mode, change RPC_HTTP_URL to use the Docker host IP
    network_mode: host

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
